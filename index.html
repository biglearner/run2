<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校園通上學規劃器 v1.3.0 - 真實路網版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; }

        #map { height: 100%; width: 100%; z-index: 1; background: #f0f4f8; }

        /* 路徑動畫核心 */
        .path-moving-emoji {
            font-size: 32px;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .animate-bounce-custom {
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes slideIn {
            from { transform: translate(-50%, -100%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        /* 隱藏 Leaflet 預設的一些控制項 */
        .leaflet-control-attribution { font-size: 10px !important; }
        .leaflet-container { font-family: inherit; }

        /* 加載動畫 */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #10b981;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-hidden">

    <div class="flex flex-col h-screen">
        <!-- 頂部導航欄 -->
        <header class="sticky top-0 z-[1000] w-full bg-white/90 backdrop-blur-md border-b border-slate-200 px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-emerald-500 p-2 rounded-xl text-white shadow-lg shadow-emerald-100">
                    <i data-lucide="navigation" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-emerald-900 uppercase">CampusRoute</h1>
                    <p class="text-[10px] text-emerald-600 font-bold tracking-widest">VER 1.3.0 | REAL-WORLD MAP</p>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <button onclick="showAlert('即將推出：即時天氣連動功能')" class="p-2 text-slate-400 hover:text-emerald-500 hover:bg-emerald-50 rounded-full transition-all relative">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full ring-2 ring-white"></span>
                </button>
                <button onclick="toggleMenu()" class="md:hidden p-2 text-slate-600">
                    <i data-lucide="menu" id="menuIcon"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
            <!-- 左側控制面板 -->
            <aside id="sidebar" class="fixed md:relative inset-0 md:inset-auto z-[999] md:z-10 w-full md:w-80 lg:w-96 bg-white border-r border-slate-200 transition-transform duration-300 transform -translate-x-full md:translate-x-0 flex flex-col shadow-xl md:shadow-none">
                <div class="p-6 space-y-8 overflow-y-auto flex-1 no-scrollbar">
                    
                    <!-- 搜尋區塊 -->
                    <section class="space-y-4">
                        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-[0.2em]">路徑搜尋</h2>
                        <div class="space-y-4">
                            <div class="relative">
                                <label class="text-[11px] font-bold text-slate-500 mb-1.5 block">📍 起點 (家)</label>
                                <div class="flex items-center gap-2 bg-slate-50 p-2.5 rounded-xl border border-slate-200 focus-within:border-emerald-500 transition-all shadow-sm">
                                    <input id="startInput" class="bg-transparent flex-1 outline-none text-sm placeholder:text-slate-300" placeholder="輸入地址或標地..." value="台北101" />
                                    <button onclick="searchLocation('start')" class="p-1.5 bg-white border border-slate-200 rounded-lg hover:bg-emerald-50 hover:text-emerald-600 transition-colors">
                                        <div id="startLoader" class="loader"></div>
                                        <i id="startSearchIcon" data-lucide="search" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="relative">
                                <label class="text-[11px] font-bold text-slate-500 mb-1.5 block">🏫 終點 (學校)</label>
                                <div class="flex items-center gap-2 bg-slate-50 p-2.5 rounded-xl border border-slate-200 focus-within:border-blue-500 transition-all shadow-sm">
                                    <input id="endInput" class="bg-transparent flex-1 outline-none text-sm placeholder:text-slate-300" placeholder="輸入學校名稱..." value="國立臺灣大學" />
                                    <button onclick="searchLocation('end')" class="p-1.5 bg-white border border-slate-200 rounded-lg hover:bg-blue-50 hover:text-blue-600 transition-colors">
                                        <div id="endLoader" class="loader"></div>
                                        <i id="endSearchIcon" data-lucide="search" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <button onclick="calculateRoute()" class="w-full bg-slate-800 hover:bg-black text-white text-sm font-black py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                            <i data-lucide="map" class="w-4 h-4"></i>
                            重新計算路徑
                        </button>
                    </section>

                    <!-- 交通模式 -->
                    <section class="space-y-4">
                        <h2 class="text-xs font-bold text-slate-400 uppercase tracking-[0.2em]">交通模式</h2>
                        <div class="grid grid-cols-3 gap-2" id="transportGrid">
                            <button onclick="setTransport('walk')" id="btn-walk" class="transport-btn flex flex-col items-center gap-2 p-3 rounded-xl transition-all border bg-emerald-100 text-emerald-600 border-current ring-4 ring-current ring-opacity-10 scale-105 shadow-sm">
                                <span class="text-xl">🚶‍♂️</span>
                                <span class="text-[10px] font-black">步行</span>
                            </button>
                            <button onclick="setTransport('bike')" id="btn-bike" class="transport-btn flex flex-col items-center gap-2 p-3 rounded-xl transition-all border bg-white border-slate-100 text-slate-400 hover:border-slate-200">
                                <span class="text-xl">🚲</span>
                                <span class="text-[10px] font-black">單車</span>
                            </button>
                            <button onclick="setTransport('transit')" id="btn-transit" class="transport-btn flex flex-col items-center gap-2 p-3 rounded-xl transition-all border bg-white border-slate-100 text-slate-400 hover:border-slate-200">
                                <span class="text-xl">🚌</span>
                                <span class="text-[10px] font-black">公車</span>
                            </button>
                        </div>
                    </section>

                    <!-- 狀態卡片 -->
                    <section class="bg-emerald-600 rounded-2xl p-5 text-white shadow-xl shadow-emerald-100 relative overflow-hidden">
                        <div class="flex items-start justify-between mb-4 relative z-10">
                            <div>
                                <h3 class="font-bold text-emerald-50 text-sm">路程統計</h3>
                                <p id="routeDistance" class="text-[10px] text-emerald-200">正在計算距離...</p>
                            </div>
                            <i data-lucide="zap" class="w-5 h-5 text-amber-300"></i>
                        </div>
                        <div class="flex items-center gap-4 relative z-10">
                            <div class="flex items-center gap-1">
                                <i data-lucide="clock" class="w-4 h-4 text-emerald-300"></i>
                                <span id="etaValue" class="text-3xl font-black italic">--</span>
                                <span class="text-xs font-bold self-end mb-1">MIN</span>
                            </div>
                        </div>
                    </section>

                    <!-- 溫馨提示 -->
                    <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl flex gap-3 shadow-sm">
                        <i data-lucide="lightbulb" class="w-5 h-5 text-blue-500 shrink-0"></i>
                        <p class="text-[11px] text-blue-800 leading-relaxed font-medium">
                            小技巧：點擊地圖上的任何位置，可以手動更換起點或終點喔！
                        </p>
                    </div>
                </div>
                
                <div class="p-6 border-t border-slate-100 bg-slate-50/50">
                    <button onclick="showAlert('導航功能已啟動，請注意路況！')" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-100 transition-all active:scale-95 flex items-center justify-center gap-2">
                        <i data-lucide="play" class="w-4 h-4 fill-current"></i>
                        開始引導
                    </button>
                </div>
            </aside>

            <!-- 右側地圖區域 -->
            <section class="flex-1 relative overflow-hidden bg-slate-200">
                <div id="map"></div>
                
                <!-- 自定義控制項 -->
                <div class="absolute bottom-6 right-6 flex flex-col gap-3 z-[1000]">
                    <button onclick="replayAnimation()" class="bg-white p-3 rounded-full shadow-2xl hover:bg-slate-50 transition-all border border-slate-100 text-emerald-600 group" title="重播動態">
                        <i data-lucide="rotate-cw" class="w-5 h-5 group-active:rotate-180 transition-transform duration-500"></i>
                    </button>
                    <button onclick="centerMap()" class="bg-white p-3 rounded-full shadow-2xl hover:bg-slate-50 transition-all border border-slate-100 text-slate-600" title="置中路徑">
                        <i data-lucide="maximize" class="w-5 h-5"></i>
                    </button>
                </div>

                <!-- 通知彈窗 -->
                <div id="notification" class="hidden absolute top-6 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur px-6 py-3 rounded-2xl shadow-2xl border border-emerald-100 flex items-center gap-3 z-[2000]" style="animation: slideIn 0.3s ease-out">
                    <div class="bg-emerald-500 p-1.5 rounded-full">
                        <i data-lucide="check" class="w-4 h-4 text-white"></i>
                    </div>
                    <p id="alertMsg" class="text-sm font-bold text-emerald-900 tracking-wide"></p>
                </div>
            </section>
        </main>
    </div>

    <script>
        // 初始化 Lucide 圖標
        lucide.createIcons();

        // 交通模式配置
        const modes = {
            walk: { emoji: '🚶‍♂️', speedKmh: 5, stroke: '#10b981', bg: 'bg-green-100', color: 'text-green-600' },
            bike: { emoji: '🚲', speedKmh: 15, stroke: '#3b82f6', bg: 'bg-blue-100', color: 'text-blue-600' },
            transit: { emoji: '🚌', speedKmh: 30, stroke: '#f97316', bg: 'bg-orange-100', color: 'text-orange-600' }
        };

        let currentTransport = 'walk';
        let map, routeLine, startMarker, endMarker, emojiMarker;
        let startCoords = [25.0339, 121.5644]; // 台北 101
        let endCoords = [25.0174, 121.5397];   // 台大

        // 初始化地圖
        function initMap() {
            map = L.map('map', {
                zoomControl: false,
                attributionControl: true
            }).setView(startCoords, 14);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // 自定義圖示
            const homeIcon = L.divIcon({
                html: `<div class="bg-white p-1 rounded-full shadow-lg border-2 border-emerald-500"><i data-lucide="map-pin" class="w-5 h-5 text-emerald-500"></i></div>`,
                className: '', iconSize: [30, 30], iconAnchor: [15, 30]
            });
            const schoolIcon = L.divIcon({
                html: `<div class="bg-white p-1 rounded-full shadow-lg border-2 border-blue-500"><i data-lucide="shield-check" class="w-5 h-5 text-blue-500"></i></div>`,
                className: '', iconSize: [30, 30], iconAnchor: [15, 30]
            });

            startMarker = L.marker(startCoords, { icon: homeIcon }).addTo(map);
            endMarker = L.marker(endCoords, { icon: schoolIcon }).addTo(map);

            calculateRoute();
            lucide.createIcons();

            // 點擊地圖更換地點
            map.on('click', function(e) {
                // 簡單邏輯：點擊切換最近的一個點
                const distStart = e.latlng.distanceTo(startCoords);
                const distEnd = e.latlng.distanceTo(endCoords);
                if (distStart < distEnd) {
                    startCoords = [e.latlng.lat, e.latlng.lng];
                    startMarker.setLatLng(startCoords);
                    document.getElementById('startInput').value = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
                } else {
                    endCoords = [e.latlng.lat, e.latlng.lng];
                    endMarker.setLatLng(endCoords);
                    document.getElementById('endInput').value = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
                }
                calculateRoute();
            });
        }

        // 地址搜尋 (Geocoding)
        async function searchLocation(type) {
            const input = document.getElementById(type + 'Input').value;
            const loader = document.getElementById(type + 'Loader');
            const icon = document.getElementById(type + 'SearchIcon');

            if (!input) return;

            loader.style.display = 'block';
            icon.style.display = 'none';

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(input)}`);
                const data = await response.json();

                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    
                    if (type === 'start') {
                        startCoords = [lat, lon];
                        startMarker.setLatLng(startCoords);
                    } else {
                        endCoords = [lat, lon];
                        endMarker.setLatLng(endCoords);
                    }
                    map.panTo([lat, lon]);
                    calculateRoute();
                } else {
                    showAlert('找不到該地址，請嘗試更具體的描述。');
                }
            } catch (err) {
                showAlert('搜尋出錯，請檢查網路連線。');
            } finally {
                loader.style.display = 'none';
                icon.style.display = 'block';
            }
        }

        // 路徑計算 (OSRM Routing)
        async function calculateRoute() {
            if (routeLine) map.removeLayer(routeLine);
            if (emojiMarker) map.removeLayer(emojiMarker);

            const url = `https://router.project-osrm.org/route/v1/driving/${startCoords[1]},${startCoords[0]};${endCoords[1]},${endCoords[0]}?overview=full&geometries=geojson`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.routes && data.routes.length > 0) {
                    const route = data.routes[0];
                    const distanceKm = route.distance / 1000;
                    const coords = route.geometry.coordinates.map(c => [c[1], c[0]]);

                    // 更新距離與時間
                    document.getElementById('routeDistance').innerText = `總距離：${distanceKm.toFixed(2)} 公里`;
                    updateETA(distanceKm);

                    // 繪製路徑
                    routeLine = L.polyline(coords, {
                        color: modes[currentTransport].stroke,
                        weight: 6,
                        opacity: 0.6,
                        dashArray: '10, 10'
                    }).addTo(map);

                    // 自動調整視野
                    map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });

                    // 準備動畫
                    startPathAnimation(coords);
                }
            } catch (err) {
                console.error(err);
                showAlert('路徑計算失敗，請稍後再試。');
            }
        }

        function updateETA(distanceKm) {
            const speed = modes[currentTransport].speedKmh;
            const hours = distanceKm / speed;
            const mins = Math.ceil(hours * 60);
            document.getElementById('etaValue').innerText = mins;
        }

        // 可愛交通工具移動動畫
        function startPathAnimation(latlngs) {
            if (emojiMarker) map.removeLayer(emojiMarker);

            const emojiIcon = L.divIcon({
                html: `<div class="path-moving-emoji animate-bounce-custom">${modes[currentTransport].emoji}</div>`,
                className: '', iconSize: [40, 40], iconAnchor: [20, 20]
            });

            emojiMarker = L.marker(latlngs[0], { icon: emojiIcon }).addTo(map);

            let step = 0;
            const totalSteps = latlngs.length;
            const duration = 4000; // 4秒走完
            const interval = duration / totalSteps;

            const move = setInterval(() => {
                if (step >= totalSteps) {
                    clearInterval(move);
                    return;
                }
                emojiMarker.setLatLng(latlngs[step]);
                step++;
            }, interval);
        }

        function setTransport(modeId) {
            currentTransport = modeId;
            const mode = modes[modeId];

            // 更新 UI 按鈕
            document.querySelectorAll('.transport-btn').forEach(btn => {
                btn.className = "transport-btn flex flex-col items-center gap-2 p-3 rounded-xl transition-all border bg-white border-slate-100 text-slate-400 hover:border-slate-200";
            });
            const activeBtn = document.getElementById(`btn-${modeId}`);
            activeBtn.className = `transport-btn flex flex-col items-center gap-2 p-3 rounded-xl transition-all border ${mode.bg} ${mode.color} border-current ring-4 ring-current ring-opacity-10 scale-105 shadow-sm`;

            calculateRoute();
            if (window.innerWidth < 768) toggleMenu(false);
        }

        function replayAnimation() {
            calculateRoute();
        }

        function centerMap() {
            if (routeLine) map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
        }

        // 側邊欄與通知
        let isMenuOpen = false;
        function toggleMenu(force) {
            isMenuOpen = force !== undefined ? force : !isMenuOpen;
            const sidebar = document.getElementById('sidebar');
            const menuIcon = document.getElementById('menuIcon');
            sidebar.classList.toggle('-translate-x-full', !isMenuOpen);
            menuIcon.setAttribute('data-lucide', isMenuOpen ? 'x' : 'menu');
            lucide.createIcons();
        }

        function showAlert(msg) {
            const note = document.getElementById('notification');
            document.getElementById('alertMsg').innerText = msg;
            note.classList.remove('hidden');
            setTimeout(() => note.classList.add('hidden'), 3000);
        }

        // 啟動
        window.onload = initMap;
    </script>
</body>
</html>
